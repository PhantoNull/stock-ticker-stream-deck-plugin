<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Stocks Settings</title>
  <link rel="stylesheet" href="css/sdpi.css" />
  <link rel="stylesheet" href="css/local.css" />
</head>
<body>
  <div class="sdpi-wrapper hidden">
    <div class="sdpi-heading">Stock Ticker</div>

    <div class="sdpi-item" id="symbol">
      <div class="sdpi-item-label">Symbol</div>
      <input class="sdpi-item-value" type="text" name="symbol" placeholder="MSFT, AAPL, NVDA" style="text-transform:uppercase" />
    </div>

    <div class="sdpi-item" id="provider">
      <div class="sdpi-item-label">Provider</div>
      <select class="sdpi-item-value select" name="provider">
        <option value="finnhub">Finnhub</option>
        <option value="yahoo">Yahoo</option>
      </select>
    </div>

    <div class="sdpi-item" id="apikey">
      <div class="sdpi-item-label">API Key</div>
      <input class="sdpi-item-value" type="text" name="apikey" />
    </div>

    <div class="sdpi-item">
      <div class="sdpi-item-label">Notes</div>
      <div class="sdpi-item-value">
        <small id="provider-help">Finnhub requires an API key. Yahoo does not.</small>
      </div>
    </div>
  </div>

  <script src="index_pi.js"></script>
</body>
</html>
