name: CI

on:
  push:
    branches:
      - master
      - main
      - migration-official-sdk-v2
  pull_request:
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate plugin
        run: npm run validate
