name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to create and release, for example v2.0.1
        required: true
      release_name:
        description: Optional release title
        required: false
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-pack-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            if [ -n "${{ inputs.release_name }}" ]; then
              echo "release_name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
            else
              echo "release_name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate plugin
        run: npm run validate

      - name: Pack plugin
        run: npm run pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin-package
          path: release/*.streamDeckPlugin

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          files: release/*.streamDeckPlugin
